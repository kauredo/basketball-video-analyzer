name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies with retry
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm ci --verbose
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "1"
          ELECTRON_CACHE: ~/.cache/electron
          ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder
          npm_config_cache: ~/.npm

      - name: Download yt-dlp binary
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" \
              -o node_modules/youtube-dl-exec/bin/yt-dlp.exe
          else
            curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp" \
              -o node_modules/youtube-dl-exec/bin/yt-dlp
            chmod +x node_modules/youtube-dl-exec/bin/yt-dlp
          fi
        shell: bash

      - name: Build application
        run: npm run build

      - name: Import macOS signing certificate
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD=$(uuidgen)
          echo "CERT_PATH=$CERT_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo -n "$MACOS_CERTIFICATE" | base64 -d > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH" >/dev/null

          EXISTING_KEYCHAINS=$(security list-keychain -d user | sed -e 's/[[:space:]]*"//g' -e 's/"$//g' | tr '\n' ' ')
          security list-keychain -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

      - name: Package application (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          P8_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 -d > "$P8_PATH"
          echo "P8_PATH=$P8_PATH" >> "$GITHUB_ENV"
          APPLE_API_KEY_PATH="$P8_PATH" npm run make

      - name: Clean up signing keychain
        if: always() && matrix.os == 'macos-latest'
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          if [ -n "${CERT_PATH:-}" ]; then
            rm -f "$CERT_PATH"
          fi
          if [ -n "${P8_PATH:-}" ]; then
            rm -f "$P8_PATH"
          fi

      - name: Package application (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package application (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: out/make/
          compression-level: 6
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-*/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
