name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies with retry
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm ci --verbose
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: "1"
          ELECTRON_CACHE: ~/.cache/electron
          ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder
          npm_config_cache: ~/.npm

      - name: Download yt-dlp binary
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" \
              -o node_modules/youtube-dl-exec/bin/yt-dlp.exe
          else
            curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp" \
              -o node_modules/youtube-dl-exec/bin/yt-dlp
            chmod +x node_modules/youtube-dl-exec/bin/yt-dlp
          fi
        shell: bash

      - name: Build application
        run: npm run build

      - name: Import macOS signing certificate
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD=$(uuidgen)
          echo "CERT_PATH=$CERT_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo -n "$MACOS_CERTIFICATE" | base64 -d > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH" >/dev/null

          EXISTING_KEYCHAINS=$(security list-keychain -d user | sed -e 's/[[:space:]]*"//g' -e 's/"$//g' | tr '\n' ' ')
          security list-keychain -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

      - name: Package application (macOS) — sign only, defer notarize
        if: matrix.os == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          SKIP_NOTARIZE: "1"
        run: |
          P8_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 -d > "$P8_PATH"
          echo "P8_PATH=$P8_PATH" >> "$GITHUB_ENV"
          APPLE_API_KEY_PATH="$P8_PATH" npm run make

      - name: Notarize macOS DMG
        if: matrix.os == 'macos-latest'
        timeout-minutes: 35
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -e
          DMG=$(find out/make -name "*.dmg" -type f | head -1)
          [ -n "$DMG" ] || { echo "::error::No .dmg found under out/make"; exit 1; }
          echo "Submitting $DMG to Apple notary (capped at 30m)..."
          xcrun notarytool submit "$DMG" \
            --key "$P8_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 30m

      - name: Staple notarization tickets
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          DMG=$(find out/make -name "*.dmg" -type f | head -1)
          APP=$(find out -name "BasketballVideoAnalyzer.app" -type d ! -path "*out/make*" | head -1)
          ZIP=$(find out/make -name "*.zip" -type f | head -1)

          echo "Stapling $DMG"
          xcrun stapler staple "$DMG"

          if [ -n "$APP" ] && [ -n "$ZIP" ]; then
            echo "Stapling $APP and rebuilding $ZIP"
            xcrun stapler staple "$APP"
            ZIP_NAME=$(basename "$ZIP")
            ZIP_DIR=$(dirname "$ZIP")
            rm "$ZIP"
            (cd "$(dirname "$APP")" && \
              ditto -c -k --sequesterRsrc --keepParent \
                "$(basename "$APP")" "$ZIP_DIR/$ZIP_NAME")
          fi

      - name: Regenerate latest-mac.yml after stapling
        if: matrix.os == 'macos-latest'
        run: |
          cat > "$RUNNER_TEMP/regen-yml.js" <<'EOF'
          const crypto = require("crypto");
          const fs = require("fs");
          const path = require("path");
          const yaml = require("js-yaml");
          const outDir = path.resolve("out/make");
          const walk = dir =>
            fs.readdirSync(dir, { withFileTypes: true }).flatMap(e => {
              const p = path.join(dir, e.name);
              return e.isDirectory() ? walk(p) : [p];
            });
          const all = walk(outDir).filter(f => /\.(dmg|zip)$/.test(f));
          const version = require(path.resolve("package.json")).version;
          const files = all.map(a => {
            const buf = fs.readFileSync(a);
            return {
              url: path.basename(a),
              sha512: crypto.createHash("sha512").update(buf).digest("base64"),
              size: buf.length,
            };
          });
          const primary = files.find(f => f.url.endsWith(".zip")) || files[0];
          fs.writeFileSync(
            path.join(outDir, "latest-mac.yml"),
            yaml.dump({
              version,
              files,
              path: primary.url,
              sha512: primary.sha512,
              releaseDate: new Date().toISOString(),
            })
          );
          console.log("latest-mac.yml regenerated with stapled artifact hashes");
          EOF
          node "$RUNNER_TEMP/regen-yml.js"

      - name: Clean up signing keychain
        if: always() && matrix.os == 'macos-latest'
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          if [ -n "${CERT_PATH:-}" ]; then
            rm -f "$CERT_PATH"
          fi
          if [ -n "${P8_PATH:-}" ]; then
            rm -f "$P8_PATH"
          fi

      - name: Package application (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package application (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: out/make/
          compression-level: 6
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-*/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
